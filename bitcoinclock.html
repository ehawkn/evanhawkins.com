<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Block Clock</title>

    <meta name="description" content="live bitcoin block clock. the timechain ticks forward.">
    <meta name="theme-color" content="#f7931a">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <meta property="og:title" content="₿ BITCOIN BLOCK CLOCK">
    <meta property="og:description" content="the timechain ticks forward. live block height.">
    <meta property="og:image" content="https://evanhawkins.com/og-image.png">
    <meta property="og:url" content="https://evanhawkins.com/bitcoinclock.html">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://evanhawkins.com/og-image.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated fractal background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 0, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 60% 70%, rgba(255, 0, 128, 0.2) 0%, transparent 50%);
            animation: fractalRotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes fractalRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Wormhole effect */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vw;
            background:
                repeating-conic-gradient(from 0deg at 50% 50%,
                    transparent 0deg,
                    rgba(0, 255, 255, 0.1) 5deg,
                    transparent 10deg,
                    rgba(255, 0, 255, 0.1) 15deg,
                    transparent 20deg);
            animation: wormhole 10s linear infinite;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        @keyframes wormhole {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.5); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); opacity: 0.3; }
        }

        .container {
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 50px;
            background: linear-gradient(90deg,
                #ff00ff, #00ffff, #ffff00, #ff00ff, #00ff00, #ff0080);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: psychedelicText 3s ease-in-out infinite;
            letter-spacing: 4px;
            text-shadow:
                0 0 20px rgba(255, 0, 255, 0.8),
                0 0 40px rgba(0, 255, 255, 0.6),
                0 0 60px rgba(255, 255, 0, 0.4);
            filter: brightness(1.5) contrast(1.2);
        }

        @keyframes psychedelicText {
            0%, 100% {
                background-position: 0% 50%;
                filter: brightness(1.5) contrast(1.2) hue-rotate(0deg);
            }
            25% {
                background-position: 50% 50%;
                filter: brightness(2) contrast(1.5) hue-rotate(90deg);
            }
            50% {
                background-position: 100% 50%;
                filter: brightness(1.8) contrast(1.3) hue-rotate(180deg);
            }
            75% {
                background-position: 50% 50%;
                filter: brightness(2) contrast(1.5) hue-rotate(270deg);
            }
        }

        .block-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            padding: 40px;
            border: 8px solid;
            border-image: linear-gradient(45deg,
                #ff00ff, #00ffff, #ffff00, #ff00ff) 1;
            box-shadow:
                0 0 30px rgba(255, 0, 255, 0.5),
                0 0 60px rgba(0, 255, 255, 0.3),
                inset 0 0 50px rgba(255, 255, 0, 0.1),
                0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: visible;
            animation: daliMelt 8s ease-in-out infinite, daliFloat 6s ease-in-out infinite;
            transform-origin: center top;
            margin: 0 auto;
        }

        @keyframes daliMelt {
            0%, 100% {
                border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%;
                transform: perspective(1000px) rotateX(0deg) rotateY(0deg) skewY(0deg);
            }
            25% {
                border-radius: 45% 55% 48% 52% / 53% 47% 53% 47%;
                transform: perspective(1000px) rotateX(-5deg) rotateY(3deg) skewY(-2deg);
            }
            50% {
                border-radius: 48% 52% 55% 45% / 47% 53% 47% 53%;
                transform: perspective(1000px) rotateX(3deg) rotateY(-5deg) skewY(3deg);
            }
            75% {
                border-radius: 52% 48% 47% 53% / 55% 45% 55% 45%;
                transform: perspective(1000px) rotateX(-3deg) rotateY(5deg) skewY(-3deg);
            }
        }

        @keyframes daliFloat {
            0%, 100% {
                transform: perspective(1000px) translateY(0px) rotateZ(0deg);
            }
            50% {
                transform: perspective(1000px) translateY(-20px) rotateZ(2deg);
            }
        }

        /* Melting drip effect */
        .block-card::before {
            content: '';
            position: absolute;
            bottom: -80px;
            left: 50%;
            width: 60px;
            height: 100px;
            background: linear-gradient(180deg,
                rgba(255, 0, 255, 0.6),
                rgba(0, 255, 255, 0.4),
                transparent);
            border-radius: 50% 50% 50% 50% / 20% 20% 80% 80%;
            transform: translateX(-50%);
            animation: drip 4s ease-in-out infinite;
            filter: blur(8px);
            z-index: -1;
        }

        @keyframes drip {
            0%, 100% {
                height: 100px;
                opacity: 0.8;
                transform: translateX(-50%) scaleY(1);
            }
            50% {
                height: 140px;
                opacity: 0.5;
                transform: translateX(-50%) scaleY(1.3);
            }
        }

        /* Second drip */
        .block-card::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: 30%;
            width: 40px;
            height: 80px;
            background: linear-gradient(180deg,
                rgba(255, 255, 0, 0.5),
                rgba(255, 0, 128, 0.3),
                transparent);
            border-radius: 50% 50% 50% 50% / 20% 20% 80% 80%;
            animation: drip2 5s ease-in-out infinite 1s;
            filter: blur(6px);
            z-index: -1;
        }

        @keyframes drip2 {
            0%, 100% {
                height: 80px;
                opacity: 0.6;
                transform: scaleY(1);
            }
            50% {
                height: 110px;
                opacity: 0.4;
                transform: scaleY(1.2);
            }
        }

        .block-header {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .block-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00);
            background-size: 200% 200%;
            box-shadow:
                0 0 40px rgba(255, 0, 255, 0.8),
                0 0 80px rgba(0, 255, 255, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            animation: iconSpin 10s linear infinite, iconPulse 2s ease-in-out infinite;
            position: relative;
            margin: 0 auto 15px;
        }

        @keyframes iconSpin {
            0% { background-position: 0% 50%; transform: rotate(0deg); }
            100% { background-position: 100% 50%; transform: rotate(360deg); }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        .block-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            animation: titleShift 3s ease-in-out infinite;
        }

        @keyframes titleShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }

        .block-info {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .info-row {
            position: absolute;
            min-width: 160px;
            max-width: 180px;
            padding: 12px;
            border: 2px solid rgba(255, 0, 255, 0.4);
            background: linear-gradient(135deg,
                rgba(255, 0, 255, 0.15),
                rgba(0, 255, 255, 0.15));
            border-radius: 15px;
            transition: all 0.3s ease;
            overflow: visible;
            text-align: center;
            animation: wobble 6s ease-in-out infinite;
            transform-origin: center;
        }

        /* Initial clean positions */
        .info-row:nth-child(1) {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .info-row:nth-child(2) {
            top: 120px;
            right: 30px;
        }

        .info-row:nth-child(3) {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .info-row:nth-child(4) {
            top: 120px;
            left: 30px;
        }

        .info-row:nth-child(5) {
            bottom: 120px;
            right: 50px;
        }

        @keyframes wobble {
            0%, 100% {
                transform: perspective(500px) rotateX(0deg) rotateY(0deg);
            }
            25% {
                transform: perspective(500px) rotateX(5deg) rotateY(-3deg);
            }
            50% {
                transform: perspective(500px) rotateX(-3deg) rotateY(5deg);
            }
            75% {
                transform: perspective(500px) rotateX(3deg) rotateY(-5deg);
            }
        }

        /* Position info rows - will be randomized on click */
        .info-row {
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .block-card.shaking {
            animation: yahtzeeShake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes yahtzeeShake {
            0%, 100% { transform: perspective(1000px) translate(0, 0) rotate(0deg); }
            10% { transform: perspective(1000px) translate(-10px, -10px) rotate(-5deg); }
            20% { transform: perspective(1000px) translate(10px, 5px) rotate(5deg); }
            30% { transform: perspective(1000px) translate(-8px, 8px) rotate(-4deg); }
            40% { transform: perspective(1000px) translate(8px, -8px) rotate(4deg); }
            50% { transform: perspective(1000px) translate(-5px, 5px) rotate(-3deg); }
            60% { transform: perspective(1000px) translate(5px, -5px) rotate(3deg); }
            70% { transform: perspective(1000px) translate(-3px, 3px) rotate(-2deg); }
            80% { transform: perspective(1000px) translate(3px, -3px) rotate(2deg); }
            90% { transform: perspective(1000px) translate(-1px, 1px) rotate(-1deg); }
        }

        .info-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .info-row:hover {
            border-color: rgba(0, 255, 255, 0.9);
            box-shadow:
                0 0 30px rgba(255, 0, 255, 0.7),
                inset 0 0 25px rgba(0, 255, 255, 0.3);
            transform: scale(1.05) perspective(500px) rotateY(10deg);
        }

        .info-label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 0, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            margin-bottom: 5px;
        }

        .info-value {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            text-shadow:
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4);
        }

        .hash {
            font-size: 0.5rem;
            word-break: break-all;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
            line-height: 1.3;
            max-width: 100%;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .spinner {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 5px solid transparent;
            border-top-color: #ff00ff;
            border-right-color: #00ffff;
            border-bottom-color: #ffff00;
            border-left-color: #ff0080;
            border-radius: 50%;
            animation: hyperSpin 1s linear infinite;
            margin: 20px auto;
            box-shadow:
                0 0 20px rgba(255, 0, 255, 0.5),
                0 0 40px rgba(0, 255, 255, 0.3);
        }

        @keyframes hyperSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff0080;
            text-align: center;
            padding: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 128, 0.8);
        }

        .refresh-info {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                margin-bottom: 30px;
            }

            .block-card {
                width: 350px;
                height: 350px;
                padding: 25px;
            }

            .info-row {
                min-width: 120px;
                max-width: 140px;
                padding: 8px;
            }

            .info-row:nth-child(1) {
                top: 20px;
            }

            .info-row:nth-child(2) {
                right: 20px;
            }

            .info-row:nth-child(3) {
                bottom: 20px;
            }

            .info-row:nth-child(4) {
                left: 20px;
            }

            .info-row:nth-child(5) {
                bottom: 90px;
                right: 30px;
            }

            .info-label {
                font-size: 0.6rem;
            }

            .info-value {
                font-size: 0.8rem;
            }

            .hash {
                font-size: 0.55rem;
            }

            .block-icon {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .block-title {
                font-size: 1.2rem;
            }
        }
    .home-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #00ffff;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #00ffff;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .home-link:hover {
            background: #00ffff;
            color: #000;
            text-shadow: none;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">← BACK TO VOID</a>
    <div class="container">
        <h1>BITCOIN BLOCK CLOCK</h1>

        <div class="block-card" id="bitcoin-card">
            <div class="block-header">
                <div class="block-icon">₿</div>
                <div class="block-title">Bitcoin</div>
            </div>
            <div class="loading">
                <div class="spinner"></div>
                <div>Loading latest block...</div>
            </div>
        </div>

        <div class="refresh-info">
            Auto-refreshing every 30 seconds
        </div>
    </div>

    <script>
        async function fetchBitcoinBlock() {
            try {
                // Using Mempool.space API which supports CORS
                const response = await fetch('https://mempool.space/api/blocks/tip/height');
                const height = await response.json();

                // Get block details
                const blockResponse = await fetch(`https://mempool.space/api/block-height/${height}`);
                const blockHash = await blockResponse.text();

                // Get full block info
                const blockInfoResponse = await fetch(`https://mempool.space/api/block/${blockHash}`);
                const block = await blockInfoResponse.json();

                const bitcoinCard = document.getElementById('bitcoin-card');
                bitcoinCard.innerHTML = `
                    <div class="block-info">
                        <div class="info-row">
                            <span class="info-label">Block Height</span>
                            <span class="info-value">#${block.height.toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Hash</span>
                            <span class="info-value hash">${block.id}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Time</span>
                            <span class="info-value">${new Date(block.timestamp * 1000).toLocaleTimeString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">TX</span>
                            <span class="info-value">${block.tx_count.toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Size</span>
                            <span class="info-value">${(block.size / 1024).toFixed(1)} KB</span>
                        </div>
                    </div>
                    <div class="block-header">
                        <div class="block-icon">₿</div>
                        <div class="block-title">Bitcoin</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('bitcoin-card').innerHTML = `
                    <div class="block-header">
                        <div class="block-icon">₿</div>
                        <div class="block-title">Bitcoin</div>
                        <div class="error" style="margin-top: 20px;">Failed to load data</div>
                    </div>
                `;
                console.error('Bitcoin fetch error:', error);
            }
        }

        // Check if two boxes collide
        function boxesCollide(box1, box2) {
            return !(box1.right < box2.left ||
                     box1.left > box2.right ||
                     box1.bottom < box2.top ||
                     box1.top > box2.bottom);
        }

        // Check if position collides with center icon
        function collidesWithCenter(x, y, width, height) {
            const centerX = 250;
            const centerY = 250;
            const centerRadius = 60; // Icon size + margin

            const boxCenterX = x + width / 2;
            const boxCenterY = y + height / 2;

            const distance = Math.sqrt(
                Math.pow(boxCenterX - centerX, 2) +
                Math.pow(boxCenterY - centerY, 2)
            );

            return distance < (centerRadius + Math.min(width, height) / 2);
        }

        // Generate non-overlapping position
        function findValidPosition(placedBoxes, width, height) {
            const margin = 25;
            const maxAttempts = 150;

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const x = Math.random() * (480 - width - margin * 2) + margin;
                const y = Math.random() * (480 - height - margin * 2) + margin;

                const newBox = {
                    left: x,
                    top: y,
                    right: x + width,
                    bottom: y + height
                };

                // Check collision with center
                if (collidesWithCenter(x, y, width, height)) {
                    continue;
                }

                // Check collision with placed boxes (with small padding)
                let hasCollision = false;
                for (const placedBox of placedBoxes) {
                    // Add 5px padding between boxes
                    const paddedBox = {
                        left: newBox.left - 5,
                        top: newBox.top - 5,
                        right: newBox.right + 5,
                        bottom: newBox.bottom + 5
                    };
                    if (boxesCollide(paddedBox, placedBox)) {
                        hasCollision = true;
                        break;
                    }
                }

                if (!hasCollision) {
                    return { x, y };
                }
            }

            // Fallback: return a position even if it might overlap slightly
            return {
                x: Math.random() * (480 - width - margin * 2) + margin,
                y: Math.random() * (480 - height - margin * 2) + margin
            };
        }

        // Yahtzee shake - randomize positions on click
        function shakeClock() {
            const card = document.getElementById('bitcoin-card');
            const infoRows = card.querySelectorAll('.info-row');

            // Add shake animation
            card.classList.add('shaking');

            // Remove shake class after animation
            setTimeout(() => {
                card.classList.remove('shaking');
            }, 600);

            // Track placed boxes to prevent overlap
            const placedBoxes = [];

            // Randomize positions of each info row
            infoRows.forEach((row) => {
                const width = row.offsetWidth || 170;
                const height = row.offsetHeight || 90;

                // Find valid non-overlapping position
                const position = findValidPosition(placedBoxes, width, height);

                // Add to placed boxes
                placedBoxes.push({
                    left: position.x,
                    top: position.y,
                    right: position.x + width,
                    bottom: position.y + height
                });

                const randomRotate = (Math.random() - 0.5) * 12; // -6 to +6 degrees (reduced for readability)

                row.style.left = position.x + 'px';
                row.style.top = position.y + 'px';
                row.style.right = 'auto';
                row.style.bottom = 'auto';
                row.style.transform = `rotate(${randomRotate}deg) perspective(500px) rotateX(${(Math.random() - 0.5) * 6}deg) rotateY(${(Math.random() - 0.5) * 6}deg)`;
            });
        }

        // Add click listener to the card
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('bitcoin-card');
            card.style.cursor = 'pointer';
            card.addEventListener('click', shakeClock);
        });

        // Initial load
        fetchBitcoinBlock();

        // Auto-refresh every 30 seconds
        setInterval(fetchBitcoinBlock, 30000);
    </script>
</body>
</html>
