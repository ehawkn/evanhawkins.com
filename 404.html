<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 ★ LOST IN THE VOID ★ EVAN HAWKINS</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#ff2d92">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=VT323&family=Silkscreen&family=Bangers&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
:root {
    --hot-pink: #ff2d92;
    --electric-blue: #00f0ff;
    --lime-green: #39ff14;
    --yellow: #ffff00;
    --void: #000;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    background: var(--void);
    color: white;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow: hidden;
    cursor: url('catgirl-cursor.png'), auto;
}

a { cursor: url('catgirl-cursor.png'), pointer; }

/* Starfield */
.stars {
    position: fixed;
    inset: 0;
    z-index: 0;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
    animation: starDrift linear infinite;
}

@keyframes starDrift {
    from { transform: translateY(-50px) translateX(0); }
    to { transform: translateY(110vh) translateX(50px); }
}

/* Drifting cat girl */
.lost-cat {
    position: fixed;
    width: 120px;
    height: 120px;
    background-image: url('catgirl-cursor.png');
    background-size: contain;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 20px var(--hot-pink)) drop-shadow(0 0 40px var(--electric-blue));
    animation: catDrift 12s ease-in-out infinite, catSpin 8s linear infinite;
    z-index: 100;
}

@keyframes catDrift {
    0%, 100% { top: 30%; left: 10%; }
    25% { top: 60%; left: 80%; }
    50% { top: 20%; left: 70%; }
    75% { top: 70%; left: 20%; }
}

@keyframes catSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Scanlines */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255, 45, 146, 0.05) 3px, transparent 4px);
    pointer-events: none;
    z-index: 999;
}

/* Center content */
.container {
    position: relative;
    z-index: 50;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
}

.error-code {
    font-family: 'Bungee Inline', cursive;
    font-size: clamp(8rem, 25vw, 18rem);
    line-height: 1;
    background: linear-gradient(90deg, var(--hot-pink), var(--electric-blue), var(--lime-green), var(--hot-pink));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientShift 3s linear infinite, glitchShake 6s infinite;
    text-shadow: 0 0 40px rgba(255, 45, 146, 0.5);
    letter-spacing: -5px;
    margin-bottom: 20px;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}

@keyframes glitchShake {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(-4px, 2px); }
    94% { transform: translate(4px, -2px); }
    96% { transform: translate(-2px, -2px); }
}

.error-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--hot-pink), 0 0 20px var(--yellow);
    letter-spacing: 3px;
    transform: rotate(-2deg);
    margin-bottom: 20px;
}

.error-text {
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    color: var(--electric-blue);
    text-shadow: 0 0 10px var(--electric-blue);
    margin-bottom: 30px;
    max-width: 600px;
    line-height: 1.4;
}

.error-coords {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.85rem;
    color: var(--lime-green);
    margin-bottom: 40px;
    letter-spacing: 3px;
    opacity: 0.8;
}

.return-btn {
    display: inline-block;
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    color: white;
    background: linear-gradient(135deg, var(--hot-pink), var(--electric-blue));
    padding: 18px 40px;
    text-decoration: none;
    border: 4px solid white;
    box-shadow:
        0 0 30px var(--hot-pink),
        inset 0 0 20px rgba(255, 255, 255, 0.2),
        6px 6px 0 black;
    transition: all 0.2s;
    letter-spacing: 3px;
    position: relative;
    z-index: 10;
}

.return-btn:hover {
    transform: translate(-3px, -3px);
    box-shadow:
        0 0 50px var(--electric-blue),
        inset 0 0 30px rgba(255, 255, 255, 0.3),
        9px 9px 0 black;
}

.return-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 30px var(--hot-pink), 3px 3px 0 black;
}

.sub-links {
    margin-top: 30px;
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: rgba(255, 255, 255, 0.5);
}

.sub-links a {
    color: var(--lime-green);
    text-decoration: none;
    margin: 0 10px;
    text-shadow: 0 0 8px var(--lime-green);
}

.sub-links a:hover { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }

/* Static noise */
.noise {
    position: fixed;
    inset: 0;
    z-index: 998;
    pointer-events: none;
    opacity: 0.04;
    background-image:
        radial-gradient(white 1px, transparent 1px);
    background-size: 4px 4px;
    animation: noiseShift 0.5s steps(5) infinite;
}

@keyframes noiseShift {
    0% { transform: translate(0, 0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(1px, -2px); }
    60% { transform: translate(-1px, 2px); }
    80% { transform: translate(2px, 1px); }
}

/* Trail */
.trail {
    position: fixed;
    width: 8px;
    height: 8px;
    pointer-events: none;
    z-index: 99999;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="lost-cat"></div>
<div class="noise"></div>

<div class="container">
    <div class="error-code">404</div>
    <h1 class="error-title">★ LOST IN THE VOID ★</h1>
    <p class="error-text">
        the page you sought has been swallowed by entropy.<br>
        the cat girl has lost the signal.<br>
        reality is incomplete here.
    </p>
    <div class="error-coords">COORDINATES :: <span id="coords">UNKNOWN</span></div>

    <a href="index.html" class="return-btn">★ RETURN HOME ★</a>

    <div class="sub-links">
        or wander:
        <a href="about.html">about</a> ·
        <a href="work.html">work</a> ·
        <a href="contact.html">contact</a> ·
        <a href="bitcoinclock.html">₿ clock</a>
    </div>
</div>

<script>
// Random coordinates
document.getElementById('coords').textContent =
    Math.floor(Math.random() * 9999).toString().padStart(4, '0') + '.' +
    Math.floor(Math.random() * 9999).toString().padStart(4, '0') + '.' +
    Math.floor(Math.random() * 9999).toString().padStart(4, '0');

// Star field
const stars = document.getElementById('stars');
const colors = ['#fff', '#ff2d92', '#00f0ff', '#ffff00', '#39ff14'];
for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = (Math.random() * -100) + 'px';
    s.style.color = colors[Math.floor(Math.random() * colors.length)];
    s.style.background = s.style.color;
    s.style.animationDuration = (5 + Math.random() * 15) + 's';
    s.style.animationDelay = (Math.random() * -20) + 's';
    stars.appendChild(s);
}

// Trail
document.addEventListener('mousemove', (e) => {
    if (Math.random() > 0.75) {
        const t = document.createElement('div');
        t.className = 'trail';
        t.style.left = (e.clientX - 4) + 'px';
        t.style.top = (e.clientY - 4) + 'px';
        const c = colors[Math.floor(Math.random() * colors.length)];
        t.style.background = c;
        t.style.boxShadow = `0 0 10px ${c}, 0 0 20px ${c}`;
        document.body.appendChild(t);
        t.animate([
            { opacity: 1, transform: 'scale(1) rotate(0deg)' },
            { opacity: 0, transform: 'scale(0.2) rotate(360deg)' }
        ], { duration: 500, easing: 'ease-out' });
        setTimeout(() => t.remove(), 500);
    }
});
</script>

</body>
</html>
